<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TIGR-CRM | Настройки профиля</title>
    <link rel="icon" type="image/png" href="https://i.imgur.com/92aAKxU.png">
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { 
            --bg-grad-1: #050505; 
            --bg-grad-2: #0a0a20;
            --panel-bg: rgba(30, 30, 35, 0.75); 
            --text-main: #ffffff; 
            --text-muted: #aaaaaa; 
            --border-color: rgba(255, 255, 255, 0.1); 
            --input-bg: rgba(20, 20, 25, 0.8); 
            --input-border: #3e3e42;
            --accent: #0078d7;
            --accent-hover: #005a9e;
        }
        [data-theme="light"] { 
            --bg-grad-1: #f5f7fa; 
            --bg-grad-2: #e4e8f0; 
            --panel-bg: rgba(255, 255, 255, 0.85); 
            --text-main: #222222; 
            --text-muted: #555555; 
            --border-color: rgba(0, 0, 0, 0.1); 
            --input-bg: rgba(240, 240, 240, 0.8); 
            --input-border: #cccccc; 
        }
        
        * { box-sizing: border-box; }
        
        body { 
            margin: 0; 
            padding: 40px 20px; 
            font-family: 'Montserrat', 'Segoe UI', Tahoma, sans-serif; 
            background: linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2)); 
            min-height: 100vh; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            color: var(--text-main); 
            transition: background 0.4s ease, color 0.4s ease; 
        }
        
        @keyframes pulse { 0% { transform: scale(0.9); opacity: 0.7; } 50% { transform: scale(1.1); opacity: 1; } 100% { transform: scale(0.9); opacity: 0.7; } }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .profile-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 25px;
            width: 100%;
            max-width: 900px;
            animation: fadeIn 0.6s ease-out;
        }

        .panel { 
            background: var(--panel-bg); 
            backdrop-filter: blur(25px); 
            border: 1px solid var(--border-color); 
            border-radius: 24px; 
            padding: 35px; 
            box-shadow: 0 15px 45px rgba(0,0,0,0.4); 
            transition: all 0.3s ease;
        }

        .header-block {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 30px;
            justify-content: center;
        }

        h2 { 
            font-weight: 900; 
            font-size: 1.8rem; 
            color: var(--accent); 
            margin: 0; 
            letter-spacing: 1px; 
            text-shadow: 0 0 15px rgba(0,120,215,0.2); 
        }

        .section-title { 
            color: var(--accent); 
            border-bottom: 2px solid var(--border-color); 
            padding-bottom: 8px; 
            margin: 25px 0 15px 0; 
            font-size: 0.95rem; 
            font-weight: 700; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }

        .form-group { margin-bottom: 18px; display: flex; flex-direction: column; gap: 8px; }
        label { font-size: 0.8rem; color: var(--text-muted); font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="number"], input[type="password"] { 
            padding: 14px; 
            background: var(--input-bg); 
            border: 1px solid var(--input-border); 
            color: var(--text-main); 
            border-radius: 12px; 
            font-size: 1rem; 
            font-family: inherit;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); 
            width: 100%; 
        }
        input:focus { 
            outline: none; 
            border-color: var(--accent); 
            box-shadow: 0 0 0 4px rgba(0,120,215,0.15); 
            background: rgba(0,0,0,0.2); 
        }

        input[type="file"] { 
            color: var(--text-muted); 
            font-size: 0.85rem; 
            padding: 10px;
            border: 1px dashed var(--input-border);
            border-radius: 12px;
            background: var(--input-bg);
            cursor: pointer;
        }

        .color-picker-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            background: var(--input-bg);
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
        }

        input[type="color"] { 
            cursor: pointer; 
            border: none; 
            border-radius: 8px; 
            background: transparent; 
            padding: 0; 
            height: 35px; 
            width: 50px; 
            transition: transform 0.2s; 
        }
        input[type="color"]::-webkit-color-swatch-wrapper { padding: 0; }
        input[type="color"]::-webkit-color-swatch { border: none; border-radius: 6px; box-shadow: 0 2px 5px rgba(0,0,0,0.2); }
        input[type="color"]:hover { transform: scale(1.1); }
        
        .avatar-container { 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 15px; 
            margin-bottom: 25px; 
        }
        .avatar-preview { 
            width: 120px; 
            height: 120px; 
            border-radius: 50%; 
            object-fit: cover; 
            border: 4px solid var(--accent); 
            background: #111; 
            display: none; 
            box-shadow: 0 8px 25px rgba(0,120,215,0.3); 
            transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
        }
        .avatar-preview:hover { transform: scale(1.08); }
        
        .grid-2col { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .grid-3col { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; }
        
        .days-grid input { text-align: center; font-weight: bold; font-size: 1.1rem; }
        
        .btn-save { 
            width: 100%; 
            background: linear-gradient(135deg, #107c10, #0b590b); 
            color: white; 
            border: none; 
            padding: 16px; 
            border-radius: 14px; 
            font-weight: 900; 
            font-size: 1.05rem; 
            cursor: pointer; 
            transition: all 0.3s; 
            margin-top: 25px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
        }
        .btn-save:hover { box-shadow: 0 8px 25px rgba(16,124,16,0.4); transform: translateY(-3px); }
        .btn-save:disabled { background: #555; cursor: not-allowed; transform: none; box-shadow: none; }
        
        .btn-back { 
            width: 100%; 
            background: transparent; 
            color: var(--text-muted); 
            border: 1px solid var(--border-color); 
            padding: 14px; 
            border-radius: 14px; 
            font-weight: bold; 
            font-size: 0.95rem; 
            cursor: pointer; 
            transition: 0.3s; 
            margin-top: 15px; 
        }
        .btn-back:hover { background: rgba(255,255,255,0.1); color: var(--text-main); }
        
        .status-msg { font-size: 0.95rem; text-align: center; margin-top: 15px; font-weight: 600; min-height: 22px; transition: 0.3s; }

        .admin-pin-block { 
            background: rgba(209, 52, 56, 0.05); 
            border: 1px solid rgba(209, 52, 56, 0.2); 
            padding: 20px; 
            border-radius: 16px; 
            margin-top: 25px; 
            display: none; 
            border-left: 4px solid #d13438;
        }

        .chart-container { height: 260px; width: 100%; margin-top: 20px; }

        @media (max-width: 800px) {
            .profile-wrapper { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
    <div id="loadingOverlay" style="display:flex; position:fixed; top:0; left:0; width:100%; height:100%; background:linear-gradient(135deg, var(--bg-grad-1), var(--bg-grad-2)); z-index:9999; justify-content:center; align-items:center; flex-direction:column; transition: opacity 0.5s ease; backdrop-filter:blur(10px);">
        <img src="https://i.imgur.com/92aAKxU.png" style="width:90px; animation: pulse 1.5s infinite; filter: drop-shadow(0 0 20px rgba(0,120,215,0.5));">
        <h3 style="color:var(--accent); font-family:'Montserrat', sans-serif; margin-top:25px; font-weight: 900; letter-spacing: 2px;">ЗАГРУЗКА ДАННЫХ</h3>
    </div>

    <div class="profile-wrapper">
        <!-- Левая колонка: Основные настройки -->
        <div class="panel">
            <div class="header-block">
                <img src="https://i.imgur.com/92aAKxU.png" alt="Logo" style="height: 45px; filter: drop-shadow(0 0 10px rgba(0,120,215,0.4));">
                <h2>Настройки</h2>
            </div>
            
            <div class="form-group">
                <label>Отображаемое имя</label>
                <input type="text" id="empName" placeholder="Введите ваше имя">
            </div>

            <h3 class="section-title">Внешний вид (Локально)</h3>
            <div class="grid-2col">
                <div class="form-group"><label>Фон (Град. 1)</label>
                    <div class="color-picker-wrapper"><input type="color" id="themeBg1" value="#050505" oninput="previewTheme()"></div>
                </div>
                <div class="form-group"><label>Фон (Град. 2)</label>
                    <div class="color-picker-wrapper"><input type="color" id="themeBg2" value="#0a0a20" oninput="previewTheme()"></div>
                </div>
                <div class="form-group"><label>Текст</label>
                    <div class="color-picker-wrapper"><input type="color" id="themeText" value="#ffffff" oninput="previewTheme()"></div>
                </div>
                <div class="form-group"><label>Панели (RGBA)</label>
                    <input type="text" id="themePanel" placeholder="rgba(30, 30, 35, 0.75)" oninput="previewTheme()" style="height: 57px;">
                </div>
            </div>

            <h3 class="section-title">Метрики по дням</h3>
            <div class="grid-3col days-grid">
                <div class="form-group"><label style="text-align:center;">ПН</label><input type="number" id="day_mon" placeholder="0"></div>
                <div class="form-group"><label style="text-align:center;">ВТ</label><input type="number" id="day_tue" placeholder="0"></div>
                <div class="form-group"><label style="text-align:center;">СР</label><input type="number" id="day_wed" placeholder="0"></div>
                <div class="form-group"><label style="text-align:center;">ЧТ</label><input type="number" id="day_thu" placeholder="0"></div>
                <div class="form-group"><label style="text-align:center;">ПТ</label><input type="number" id="day_fri" placeholder="0"></div>
                <div class="form-group"><label style="text-align:center;">СБ</label><input type="number" id="day_sat" placeholder="0"></div>
            </div>

            <div id="adminPinBlock" class="admin-pin-block">
                <h3 style="color: #d13438; font-size: 1rem; margin-top: 0; margin-bottom: 12px; font-weight: 900;">🛡️ Доступ Администратора</h3>
                <label style="color: var(--text-main);">Сохраненный PIN-код для автоматических правок</label>
                <input type="password" id="savedAdminPin" placeholder="****" style="margin-top: 10px; text-align: center; letter-spacing: 8px; font-size: 1.2rem; font-weight: bold;" oninput="saveAdminPinLocally()">
            </div>
        </div>

        <!-- Правая колонка: Аватар, Идентификация и Статистика -->
        <div class="panel" style="display: flex; flex-direction: column;">
            <div class="avatar-container">
                <img id="avatarPreview" class="avatar-preview" src="" alt="Аватар">
                <div class="form-group" style="width: 100%;">
                    <label style="text-align: center; margin-bottom: 8px; display: block;">Фото профиля (Max: 2MB)</label>
                    <input type="file" id="avatarFile" accept="image/*">
                </div>
            </div>

            <div class="form-group">
                <label>Цвет в рейтинге (Глобально)</label>
                <div class="color-picker-wrapper" style="justify-content: space-between;">
                    <span style="font-size: 0.85rem; color: var(--text-muted); line-height: 1.4;">Этот цвет выделит ваши результаты в общих списках и таблицах.</span>
                    <input type="color" id="personalColor" value="#0078d7">
                </div>
            </div>

            <div style="flex-grow: 1;"></div> <!-- Spacer -->

            <div style="margin-top: 20px;">
                <label style="display:block; text-align:center; font-weight:bold; color:var(--text-muted); text-transform: uppercase; font-size: 0.85rem; letter-spacing: 1px;">Эффективность VS Отдел</label>
                <div class="chart-container"><canvas id="compareChart"></canvas></div>
            </div>

            <button id="saveBtn" class="btn-save" onclick="saveProfile()">Сохранить изменения</button>
            <button class="btn-back" onclick="window.location.href='index.html'">← Вернуться на Дашборд</button>
            <div id="statusMsg" class="status-msg"></div>
        </div>
    </div>

    <script>
        const SUPABASE_URL = "https://geolvowpvdxnimypcvfx.supabase.co"; 
        const SUPABASE_ANON_KEY = "sb_publishable_NYYVxFGX8ZnVK0CyEFPehg_z58eWBut"; 
        const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

        let currentUsername = localStorage.getItem('crm_username') || '';
        let base64AvatarString = ""; 
        let currentEmployeeId = null;
        let compareChartInst = null;
        let originalDays = [0, 0, 0, 0, 0, 0]; 

        if (localStorage.getItem('crm_theme') === 'light') { document.documentElement.setAttribute('data-theme', 'light'); }

        function previewTheme() {
            document.body.style.background = `linear-gradient(135deg, ${document.getElementById('themeBg1').value}, ${document.getElementById('themeBg2').value})`;
            document.body.style.color = document.getElementById('themeText').value;
            document.documentElement.style.setProperty('--panel-bg', document.getElementById('themePanel').value);
        }

        function saveAdminPinLocally() {
            localStorage.setItem('crm_saved_admin_pin', document.getElementById('savedAdminPin').value);
        }

        document.getElementById('avatarFile').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const msgEl = document.getElementById('statusMsg');
            if (file) {
                if (file.size > 2 * 1024 * 1024) { 
                    msgEl.style.color = '#ff4d4d';
                    msgEl.innerText = "Файл слишком большой! Максимум 2 МБ.";
                    this.value = ""; return;
                }
                const reader = new FileReader();
                reader.onload = function(event) {
                    base64AvatarString = event.target.result;
                    const preview = document.getElementById('avatarPreview');
                    preview.src = base64AvatarString;
                    preview.style.display = 'block';
                    msgEl.innerText = "";
                };
                reader.readAsDataURL(file);
            }
        });

        async function loadProfileData() {
            if (!currentUsername) { window.location.href = 'login.html'; return; }
            
            if (localStorage.getItem('crm_role') === 'admin') {
                document.getElementById('adminPinBlock').style.display = 'block';
                document.getElementById('savedAdminPin').value = localStorage.getItem('crm_saved_admin_pin') || '';
            }

            let { data: allEmp } = await db.from('employees').select('*');
            let { data: emp } = await db.from('employees').select('*').eq('name', currentUsername).maybeSingle();
            
            let personalColor = '#0078d7';

            if (emp) {
                currentEmployeeId = emp.id;
                document.getElementById('empName').value = emp.name || '';
                
                originalDays = [emp.mon||0, emp.tue||0, emp.wed||0, emp.thu||0, emp.fri||0, emp.sat||0];
                
                document.getElementById('day_mon').value = originalDays[0];
                document.getElementById('day_tue').value = originalDays[1];
                document.getElementById('day_wed').value = originalDays[2];
                document.getElementById('day_thu').value = originalDays[3];
                document.getElementById('day_fri').value = originalDays[4];
                document.getElementById('day_sat').value = originalDays[5];
                
                document.getElementById('personalColor').value = emp.personal_color || '#0078d7';
                personalColor = emp.personal_color || '#0078d7';

                if (emp.custom_theme) {
                    const theme = typeof emp.custom_theme === 'string' ? JSON.parse(emp.custom_theme) : emp.custom_theme;
                    document.getElementById('themeBg1').value = theme.bgGrad1 || '#050505';
                    document.getElementById('themeBg2').value = theme.bgGrad2 || '#0a0a20';
                    document.getElementById('themeText').value = theme.textMain || '#ffffff';
                    document.getElementById('themePanel').value = theme.panelBg || 'rgba(30, 30, 35, 0.75)';
                    previewTheme();
                }

                if (emp.avatar_url) {
                    base64AvatarString = emp.avatar_url;
                    const preview = document.getElementById('avatarPreview');
                    preview.src = base64AvatarString;
                    preview.style.display = 'block';
                }
            } else { document.getElementById('empName').value = currentUsername; }

            generateCompareChart(originalDays, allEmp || [], personalColor);

            setTimeout(() => {
                const overlay = document.getElementById('loadingOverlay');
                overlay.style.opacity = '0';
                setTimeout(() => overlay.style.display = 'none', 500);
            }, 600);
        }

        function generateCompareChart(myDays, allEmployees, myColor) {
            let avgDays = [0,0,0,0,0,0];
            let count = allEmployees.length;
            
            if(count > 0) {
                allEmployees.forEach(e => {
                    avgDays[0] += e.mon || 0; avgDays[1] += e.tue || 0; avgDays[2] += e.wed || 0;
                    avgDays[3] += e.thu || 0; avgDays[4] += e.fri || 0; avgDays[5] += e.sat || 0;
                });
                avgDays = avgDays.map(v => Math.round((v / count) * 10) / 10);
            }

            const isDark = document.documentElement.getAttribute('data-theme') !== 'light';
            const txtColor = isDark ? '#aaaaaa' : '#555555';
            const gridColor = isDark ? 'rgba(255,255,255,0.05)' : 'rgba(0,0,0,0.05)';

            const ctx = document.getElementById('compareChart').getContext('2d');
            compareChartInst = new Chart(ctx, {
                type: 'bar',
                data: {
                    labels: ['ПН', 'ВТ', 'СР', 'ЧТ', 'ПТ', 'СБ'],
                    datasets: [
                        { label: 'Я', data: myDays, backgroundColor: myColor, borderRadius: 8, maxBarThickness: 30 },
                        { label: 'Отдел', data: avgDays, backgroundColor: isDark ? 'rgba(255,255,255,0.15)' : 'rgba(0,0,0,0.15)', borderRadius: 8, maxBarThickness: 30 }
                    ]
                },
                options: {
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { labels: { color: txtColor, font: { family: 'Montserrat', weight: 'bold' } } } },
                    scales: {
                        x: { ticks: { color: txtColor, font: { weight: 'bold' } }, grid: { display: false } },
                        y: { ticks: { color: txtColor }, grid: { color: gridColor } }
                    },
                    animation: { duration: 1500, easing: 'easeOutQuart' }
                }
            });
        }

        async function saveProfile() {
            const msgEl = document.getElementById('statusMsg');
            const btn = document.getElementById('saveBtn');
            const name = document.getElementById('empName').value.trim();
            
            if(!name) { msgEl.style.color = '#ff4d4d'; msgEl.innerText = "Имя не может быть пустым!"; return; }

            const newDays = [
                parseInt(document.getElementById('day_mon').value) || 0,
                parseInt(document.getElementById('day_tue').value) || 0,
                parseInt(document.getElementById('day_wed').value) || 0,
                parseInt(document.getElementById('day_thu').value) || 0,
                parseInt(document.getElementById('day_fri').value) || 0,
                parseInt(document.getElementById('day_sat').value) || 0
            ];
            
            const daysChanged = originalDays.some((val, index) => val !== newDays[index]);

            if (daysChanged) {
                const savedPin = localStorage.getItem('crm_saved_admin_pin');
                if (savedPin !== "0402") {
                    const pass = prompt("Запрос разрешения администратора. Введите PIN-код (0402):");
                    if (pass !== "0402") {
                        msgEl.style.color = '#ff4d4d';
                        msgEl.innerText = "Отказано в доступе: Неверный PIN-код.";
                        return;
                    }
                }
            }

            btn.disabled = true;
            btn.innerHTML = "Синхронизация <span style='font-size: 0.8em'>🔄</span>";
            msgEl.style.color = '#0078d7'; // Исправленная строка
            msgEl.innerText = "Сохранение данных в БД...";

            const themeSettings = {
                bgGrad1: document.getElementById('themeBg1').value,
                bgGrad2: document.getElementById('themeBg2').value,
                textMain: document.getElementById('themeText').value,
                panelBg: document.getElementById('themePanel').value
            };

            const payload = {
                name: name,
                mon: newDays[0], tue: newDays[1], wed: newDays[2], 
                thu: newDays[3], fri: newDays[4], sat: newDays[5],
                avatar_url: base64AvatarString,
                personal_color: document.getElementById('personalColor').value,
                custom_theme: themeSettings
            };

            localStorage.setItem('crm_custom_theme', JSON.stringify(themeSettings));
            await db.from('system_users').update({ username: name }).eq('username', currentUsername);

            let result;
            if (currentEmployeeId) {
                result = await db.from('employees').update(payload).eq('id', currentEmployeeId);
            } else {
                const { data: maxEmp } = await db.from('employees').select('id').order('id', { ascending: false }).limit(1).maybeSingle();
                const nextId = maxEmp ? maxEmp.id + 1 : 1;
                payload.id = nextId;
                result = await db.from('employees').insert([payload]);
            }

            if (result.error) {
                console.error(result.error);
                msgEl.style.color = '#ff4d4d';
                msgEl.innerText = "Ошибка сохранения: " + result.error.message;
                btn.disabled = false;
                btn.innerText = "Сохранить изменения";
            } else {
                localStorage.setItem('crm_username', name);
                msgEl.style.color = '#107c10';
                msgEl.innerText = "Успешно сохранено! Возврат на главную...";
                setTimeout(() => { window.location.href = 'index.html'; }, 1200);
            }
        }

        window.onload = loadProfileData;
    </script>
</body>
</html>
